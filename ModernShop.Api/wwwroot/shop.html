<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>آتلیه | فروشگاه</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  :root{
    --background:#F6F5F0; --foreground:#14171C; --surface:#FFFFFF; --surface-muted:#EFEEE7;
    --line:#E1DED3; --muted:#6B7280; --emerald:#1F6F5C; --emerald-deep:#123B31;
    --emerald-soft:#E4EFEB; --gold:#B8903E; --gold-soft:#F3E9D3; --danger:#B4432F; --media:#16181C;
  }
  body{font-family:'Vazirmatn',Tahoma,sans-serif;color:var(--foreground);transition:.3s; overflow-x-hidden;background:radial-gradient(1100px 560px at 12% -8%, color-mix(in srgb, var(--gold) 8%, transparent), transparent 55%),radial-gradient(1000px 560px at 100% 6%, color-mix(in srgb, var(--emerald) 7%, transparent), transparent 55%),var(--background);background-repeat:no-repeat;}
  .ticker{font-family:'JetBrains Mono',monospace;direction:ltr;unicode-bidi:isolate;letter-spacing:-.02em}
  .bg-surface{background:var(--surface)} .bg-surface-muted{background:var(--surface-muted)}
  .bg-bg{background:var(--background)} .border-line{border-color:var(--line)}
  .text-muted{color:var(--muted)} .text-emerald{color:var(--emerald)} .bg-emerald{background:var(--emerald)}
  .bg-emerald-deep{background:var(--emerald-deep)} .text-emerald-deep{color:var(--emerald-deep)} .bg-emerald-soft{background:var(--emerald-soft)}
  .text-gold{color:var(--gold)} .bg-gold-soft{background:var(--gold-soft)}
  .text-danger{color:var(--danger)} .bg-danger\/10{background:color-mix(in srgb, var(--danger) 10%, transparent)}
  .bg-media{background:var(--media)}
  .border-emerald{border-color:var(--emerald)}
  .bg-surface\/90{background:color-mix(in srgb, var(--surface) 90%, transparent)}
  .bg-surface\/95{background:color-mix(in srgb, var(--surface) 95%, transparent)}
  .hover\:bg-surface-muted:hover{background:var(--surface-muted)}
  .hover\:border-emerald:hover{border-color:var(--emerald)}
  .hover\:text-emerald:hover{color:var(--emerald)}
  .bg-emerald-hover:hover{background:#195d4d}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{scrollbar-width:none}
  input:focus,select:focus{outline:none;border-color:var(--emerald);box-shadow:0 0 0 3px var(--emerald-soft)}
  input[type=checkbox]{accent-color:var(--emerald)}
  .fade-card{opacity:0;transform:translateY(10px);transition:opacity .35s ease,transform .35s ease}
  .fade-card.show{opacity:1;transform:translateY(0)}
  .chip{transition:.15s}
  .chip.active{background:var(--emerald);color:#fff;border-color:var(--emerald)}
  .rating-btn.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
  .page-btn.active{background:var(--emerald);color:#fff;border-color:var(--emerald)}
  .toggle-switch{width:38px;height:22px;border-radius:999px;background:var(--line);position:relative;transition:.2s;flex-shrink:0}
  .toggle-switch::after{content:"";position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
  .toggle-switch.on{background:var(--emerald)}
  .toggle-switch.on::after{right:18px}
  
  /* Price row fixes for mobile overflow */
  .price-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0.5rem 0.75rem;
  }
  .price-row .old-price {
    order: 3;
    width: 100%;
  }
  
  /* Card improvements */
  .product-card {
    min-width: 0;
    overflow: hidden;
  }
  .product-card h3 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>
</head>
<body class="bg-bg">
<div id="toast-root" class="pointer-events-none fixed inset-x-0 top-4 z-[200] flex flex-col items-center gap-2 px-4"></div>
<div id="header-placeholder"></div>

<div class="border-b border-line bg-surface">
  <div class="mx-auto flex max-w-7xl items-center gap-2 px-4 py-3 text-xs text-muted sm:px-6 lg:px-8">
    <a href="#" class="hover:text-emerald">صفحه اصلی</a>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    <span class="text-foreground/70">فروشگاه</span>
  </div>
</div>

<div class="mx-auto max-w-7xl px-4 py-7 sm:px-6 lg:px-8">
  <h1 class="text-2xl font-extrabold tracking-tight sm:text-3xl">همه محصولات</h1>
  
  <div class="mt-5 grid grid-cols-1 gap-8 lg:grid-cols-[280px_1fr]">
    <!-- ============ FILTERS (right side on desktop via RTL) ============ -->
    <aside class="hidden lg:block">
      <div class="sticky top-24 rounded-3xl border border-line bg-surface p-5" id="filters-desktop"></div>
    </aside>
    
    <!-- ============ PRODUCTS ============ -->
    <div>
      <!-- top bar -->
      <div class="mb-5 flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-line bg-surface px-4 py-3">
        <p class="text-xs text-muted" id="result-text">در حال بارگذاری...</p>
        <div class="flex items-center gap-2">
          <button onclick="openSheet('filters')" class="flex items-center gap-1.5 rounded-full border border-line px-3.5 py-2 text-xs font-medium lg:hidden">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
            فیلترها
          </button>
          <button onclick="openSheet('sort')" class="flex items-center gap-1.5 rounded-full border border-line px-3.5 py-2 text-xs font-medium lg:hidden">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5h10M11 12h7M11 19h4M4 5v14M4 5l3 3M4 5 1 8M4 19l3-3M4 19l-3-3"/></svg>
            مرتب‌سازی
          </button>
          <div class="hidden items-center gap-2 lg:flex">
            <label class="text-xs text-muted">نمایش بر اساس</label>
            <select id="sort-select" class="rounded-xl border border-line bg-surface-muted px-3 py-2 text-xs font-medium">
              <option value="newest">جدیدترین</option>
              <option value="bestselling">پرفروش‌ترین</option>
              <option value="cheap">ارزان‌ترین</option>
              <option value="expensive">گران‌ترین</option>
              <option value="rating">بهترین امتیاز</option>
            </select>
          </div>
        </div>
      </div>
      
      <div id="product-grid" class="grid grid-cols-2 gap-3 sm:grid-cols-3 sm:gap-4"></div>
      
      <div id="loading-row" class="mt-6 hidden items-center justify-center gap-2 text-xs text-muted">
        <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.2-8.5"/></svg>
        در حال بارگذاری...
      </div>
      
      <div id="pagination" class="mt-8 flex items-center justify-center gap-1.5"></div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="mobile-nav-placeholder"></div>

<!-- mobile bottom sheets -->
<div id="sheet-overlay" class="fixed inset-0 z-[90] hidden bg-black/40 lg:hidden" onclick="closeSheet()"></div>
<div id="sheet-panel" class="fixed inset-x-0 bottom-16 z-[95] hidden max-h-[70svh] w-full flex-col translate-y-full overflow-hidden rounded-t-3xl border-t border-line bg-surface transition-transform duration-300 ease-out lg:hidden">
  <div class="flex shrink-0 items-center justify-between border-b border-line px-4 py-3">
    <h3 id="sheet-title" class="text-sm font-bold"></h3>
    <button onclick="closeSheet()" class="rounded-full p-2 text-foreground/80 hover:bg-surface-muted" aria-label="بستن">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="sheet-body" class="min-h-0 flex-1 overflow-y-auto p-4"></div>
  <div id="sheet-footer" class="hidden shrink-0 items-center gap-2 border-t border-line bg-surface px-4 py-3"></div>
</div>

<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/search.js"></script>
<script src="js/mobile-nav.js"></script>
<script src="js/color-map.js"></script>
<script src="js/product-card.js"></script>
<script>
const spinnerSVG = '<svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.2-8.5"/></svg>';

function showToast(kind, message){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  const styles = kind === 'success' ? 'border-emerald bg-emerald-soft text-emerald-deep' : 'border-danger bg-danger/10 text-danger';
  el.className = `pointer-events-auto flex items-center gap-2 rounded-full border px-4 py-2.5 text-sm font-medium shadow-lg backdrop-blur-md opacity-0 -translate-y-3 transition-all duration-300 ${styles}`;
  el.innerHTML = (kind === 'success'
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.1V12a10 10 0 1 1-5.9-9.1"/><path d="m9 11 3 3L22 4"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>')
    + `<span>${message}</span>`;
  root.appendChild(el);
  requestAnimationFrame(() => el.classList.remove('opacity-0', '-translate-y-3'));
  setTimeout(() => { el.classList.add('opacity-0', '-translate-y-3'); setTimeout(() => el.remove(), 300); }, 3000);
}

const faDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
function toFa(n){ return String(n).replace(/[0-9]/g, d => faDigits[d]); }
function fmt(n){ return toFa(n.toLocaleString('en-US')); }

// خیلی از کیبوردهای فارسی موبایل، تو input عددی هم ارقام فارسی/عربی (۰۱۲... یا ٠١٢...) می‌فرستن؛
// parseInt این ارقام رو نمی‌فهمه و بی‌سروصدا NaN برمی‌گردونه، پس فیلتر قیمت اصلاً اعمال نمی‌شد.
function toEnDigits(str){
  const fa = '۰۱۲۳۴۵۶۷۸۹', ar = '٠١٢٣٤٥٦٧٨٩';
  return String(str ?? '').replace(/[۰-۹٠-٩]/g, ch => {
    const i = fa.indexOf(ch);
    if (i > -1) return String(i);
    const j = ar.indexOf(ch);
    return j > -1 ? String(j) : ch;
  });
}

/* ================= STATE ================= */
const filterState = {
  categoryIds: [],
  brandIds: [],
  minPrice: null,
  maxPrice: null,
  minRating: 0,
  inStockOnly: false,
  search: '',
  sort: 'newest',
  page: 1,
  pageSize: 50
};

let allProducts = [];
let totalCount = 0;
let currentPage = 1;
let isLoading = false;
let CATEGORIES = [];   // [{id, name, slug}]
let BRANDS = [];       // [{id, name}]

/* ================= API CALL ================= */
async function fetchProducts() {
  if (isLoading) return;
  isLoading = true;
  showLoadingRow(true);

  try {
    const params = new URLSearchParams({
      page: filterState.page,
      pageSize: filterState.pageSize,
      sortBy: filterState.sort
    });

    if (filterState.categoryIds.length) params.append('categoryIds', filterState.categoryIds.join(','));
    if (filterState.brandIds.length) params.append('brandIds', filterState.brandIds.join(','));
    if (filterState.minPrice) params.append('minPrice', filterState.minPrice);
    if (filterState.maxPrice) params.append('maxPrice', filterState.maxPrice);
    if (filterState.inStockOnly) params.append('inStockOnly', 'true');
    if (filterState.minRating) params.append('minRating', filterState.minRating);
    if (filterState.search) params.append('search', filterState.search);

    const result = await Api.getProducts(`?${params}`);

    allProducts = result.items || [];
    totalCount = result.totalCount || 0;

    await ProductCard.loadState();
    renderProducts();
    updateResultText();
    renderPagination();
  } catch (e) {
    console.error(e);
    showToast('error', 'خطا در دریافت محصولات');
  } finally {
    isLoading = false;
    showLoadingRow(false);
  }
}

function renderProducts() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = allProducts.map(ProductCard.render).join('');
  requestAnimationFrame(() => {
    grid.querySelectorAll('.product-card').forEach(el => el.classList.add('show'));
  });
}

/* ================= FILTER UI (دسته‌بندی/برند واقعی از بک‌اند) ================= */
async function loadCategoriesAndBrands() {
  try {
    const [cats, brands] = await Promise.all([Api.getCategories(), Api.getBrands()]);
    CATEGORIES = cats.map(c => ({ id: c.id, name: c.name, slug: c.slug }));
    BRANDS = brands.map(b => ({ id: b.id, name: b.name }));
  } catch (e) {
    CATEGORIES = [];
    BRANDS = [];
  }
}

// رو دسکتاپ هر تغییر فوراً اعمال می‌شه (فیلتر کناری زنده‌ست)، ولی رو موبایل فقط وضعیت و
// ظاهر تیک‌ها به‌روز می‌شه و فچ واقعی فقط با زدن دکمه‌ی «اعمال فیلترها» انجام می‌شه
function toggleCategory(id, scope) {
  if (filterState.categoryIds.includes(id)) {
    filterState.categoryIds = filterState.categoryIds.filter(c => c !== id);
  } else {
    filterState.categoryIds.push(id);
  }
  renderFilters();
  if (scope === 'desktop') resetAndRender();
}

function toggleBrand(id, scope) {
  if (filterState.brandIds.includes(id)) {
    filterState.brandIds = filterState.brandIds.filter(b => b !== id);
  } else {
    filterState.brandIds.push(id);
  }
  renderFilters();
  if (scope === 'desktop') resetAndRender();
}

function setRating(val, scope) {
  filterState.minRating = filterState.minRating === val ? 0 : val;
  renderFilters();
  if (scope === 'desktop') resetAndRender();
}

function toggleInStock(scope) {
  filterState.inStockOnly = !filterState.inStockOnly;
  renderFilters();
  if (scope === 'desktop') resetAndRender();
}

// این فقط رو دسکتاپ استفاده می‌شه (دکمه‌ی «اعمال قیمت» کنار خودِ فیلد قیمت)؛ رو موبایل قیمت
// هم مثل بقیه‌ی فیلترها با دکمه‌ی مشترک «اعمال فیلترها» اعمال می‌شه (applyFiltersFromSheet)
function applyPrice(scope) {
  const min = toEnDigits(document.getElementById(`${scope}-price-min`)?.value);
  const max = toEnDigits(document.getElementById(`${scope}-price-max`)?.value);
  filterState.minPrice = min ? parseInt(min) : null;
  filterState.maxPrice = max ? parseInt(max) : null;
  resetAndRender();
  showToast('success', 'فیلتر قیمت اعمال شد');
}

// رو دسکتاپ فوراً اعمال می‌شه؛ رو موبایل (لینک «پاک کردن همه» بالای شیت) فقط پاک می‌کنه و
// می‌ذاره شیت باز بمونه، دقیقاً مثل دکمه‌ی «حذف فیلترها» پایین شیت
function clearFilters(scope) {
  filterState.categoryIds = [];
  filterState.brandIds = [];
  filterState.minPrice = null;
  filterState.maxPrice = null;
  filterState.minRating = 0;
  filterState.inStockOnly = false;
  renderFilters();
  if (scope === 'desktop') {
    resetAndRender();
    showToast('success', 'فیلترها پاک شد');
  }
}

// دکمه‌ی «اعمال فیلترها» پایین شیت موبایل: قیمت رو هم از فیلد می‌خونه، همه‌چیز رو یک‌جا
// اعمال می‌کنه و بعد شیت رو می‌بنده
function applyFiltersFromSheet() {
  const min = toEnDigits(document.getElementById('mobile-price-min')?.value);
  const max = toEnDigits(document.getElementById('mobile-price-max')?.value);
  filterState.minPrice = min ? parseInt(min) : null;
  filterState.maxPrice = max ? parseInt(max) : null;
  resetAndRender();
  closeSheet();
  showToast('success', 'فیلترها اعمال شد');
}

function clearSearch() {
  filterState.search = '';
  const url = new URL(window.location.href);
  url.searchParams.delete('search');
  window.history.replaceState({}, '', url);
  updateResultText();
  resetAndRender();
}

function setSort(val) {
  filterState.sort = val;
  document.getElementById('sort-select').value = val;
  document.querySelectorAll('.sort-radio').forEach(r => r.checked = (r.value === val));
  resetAndRender();
  closeSheet(); // رو موبایل، بعد از انتخاب گزینه مرتب‌سازی، شیت خودش بسته بشه
}

function filtersHTML(scope) {
  return `
    <div class="mb-5 flex items-center justify-between">
      <h2 class="text-sm font-bold">فیلترها</h2>
      <button onclick="clearFilters('${scope}')" class="text-xs font-medium text-emerald hover:underline">پاک کردن همه</button>
    </div>
    <div class="mb-5">
      <p class="mb-2.5 text-xs font-semibold text-muted">دسته‌بندی</p>
      <div class="flex flex-col gap-2">
        ${CATEGORIES.length ? CATEGORIES.map(c => `
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" onchange="toggleCategory(${c.id}, '${scope}')" ${filterState.categoryIds.includes(c.id)?'checked':''} />
            ${c.name}
          </label>`).join('') : '<p class="text-xs text-muted">دسته‌بندی‌ای یافت نشد</p>'}
      </div>
    </div>
    <div class="mb-5 border-t border-line pt-5">
      <p class="mb-2.5 text-xs font-semibold text-muted">محدوده قیمت (تومان)</p>
      <div class="flex items-center gap-2">
        <input id="${scope}-price-min" type="number" placeholder="مثلاً ۵۰۰۰۰۰" class="ticker w-full rounded-xl border border-line bg-surface-muted px-3 py-2 text-xs" value="${filterState.minPrice ?? ''}" />
        <span class="text-muted text-xs">تا</span>
        <input id="${scope}-price-max" type="number" placeholder="مثلاً ۵۰۰۰۰۰۰" class="ticker w-full rounded-xl border border-line bg-surface-muted px-3 py-2 text-xs" value="${filterState.maxPrice ?? ''}" />
      </div>
      ${scope === 'desktop' ? `<button onclick="applyPrice('desktop')" class="mt-2.5 w-full rounded-xl border border-emerald py-2 text-xs font-semibold text-emerald hover:bg-emerald-soft">اعمال قیمت</button>` : ''}
    </div>
    <div class="mb-5 border-t border-line pt-5">
      <p class="mb-2.5 text-xs font-semibold text-muted">برند</p>
      <div class="flex flex-col gap-2">
        ${BRANDS.length ? BRANDS.map(b => `
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" onchange="toggleBrand(${b.id}, '${scope}')" ${filterState.brandIds.includes(b.id)?'checked':''} />
            ${b.name}
          </label>`).join('') : '<p class="text-xs text-muted">برندی یافت نشد</p>'}
      </div>
    </div>
    <div class="mb-5 border-t border-line pt-5">
      <p class="mb-2.5 text-xs font-semibold text-muted">حداقل امتیاز</p>
      <div class="flex flex-wrap gap-2">
        ${[4,3,2].map(r => `
          <button onclick="setRating(${r}, '${scope}')" class="rating-btn ${filterState.minRating===r?'active':''} flex items-center gap-1 rounded-full border border-line px-3 py-1.5 text-xs font-medium">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1Z"/></svg>
            ${toFa(r)}+
          </button>`).join('')}
      </div>
    </div>
    <div class="border-t border-line pt-5">
      <label class="flex cursor-pointer items-center justify-between text-sm">
        <span>فقط کالاهای موجود</span>
        <span onclick="toggleInStock('${scope}')" class="toggle-switch ${filterState.inStockOnly?'on':''}"></span>
      </label>
    </div>
  `;
}

function renderFilters(){
  document.getElementById('filters-desktop').innerHTML = filtersHTML('desktop');
  const mobileBody = document.getElementById('sheet-filters-body');
  if(mobileBody) mobileBody.innerHTML = filtersHTML('mobile');
}

function updateResultText(){
  const el = document.getElementById('result-text');
  const searchNote = filterState.search
    ? `<span class="inline-flex items-center gap-1.5">نتایج جستجو برای «${filterState.search}»<button onclick="clearSearch()" class="text-emerald hover:underline">(پاک کردن)</button></span> — `
    : '';
  if(totalCount === 0){
    el.innerHTML = searchNote + 'محصولی با این فیلترها یافت نشد';
    return;
  }
  el.innerHTML = searchNote + `نمایش ${toFa(allProducts.length)} از ${toFa(totalCount)} محصول`;
}

function showLoadingRow(show){
  const row = document.getElementById('loading-row');
  row.classList.toggle('hidden', !show);
  row.classList.toggle('flex', show);
}

function renderPagination(){
  const wrap = document.getElementById('pagination');
  const totalPages = Math.ceil(totalCount / filterState.pageSize);
  if(totalPages <= 1){ wrap.innerHTML = ''; return; }
  
  let html = '';
  html += `<button onclick="goToPage(${Math.max(1,currentPage-1)})" ${currentPage===1?'disabled':''} class="page-btn flex h-9 w-9 items-center justify-center rounded-full border border-line text-sm disabled:opacity-30">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </button>`;
  
  for(let n=1; n<=Math.min(totalPages, 7); n++){
    html += `<button onclick="goToPage(${n})" class="page-btn ${n===currentPage?'active':''} ticker flex h-9 w-9 items-center justify-center rounded-full border border-line text-sm font-semibold">${toFa(n)}</button>`;
  }
  
  html += `<button onclick="goToPage(${Math.min(totalPages,currentPage+1)})" ${currentPage===totalPages?'disabled':''} class="page-btn flex h-9 w-9 items-center justify-center rounded-full border border-line text-sm disabled:opacity-30">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg>
    </button>`;
  wrap.innerHTML = html;
}

function goToPage(n){
  currentPage = n;
  filterState.page = n;
  document.getElementById('product-grid').innerHTML = '';
  fetchProducts();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetAndRender(){
  currentPage = 1;
  filterState.page = 1;
  document.getElementById('product-grid').innerHTML = '';
  document.getElementById('pagination').innerHTML = '';
  fetchProducts();
}

/* کارت محصول از کامپوننت مشترک js/product-card.js میاد (ProductCard.render/bind) */

/* ================= MOBILE SHEETS ================= */
const sheetTitles = { filters: 'فیلترها', sort: 'مرتب‌سازی' };
let currentSheet = null;

function sortSheetHTML(){
  const options = [
    ['newest','جدیدترین'], ['bestselling','پرفروش‌ترین'], ['cheap','ارزان‌ترین'], ['expensive','گران‌ترین'], ['rating','بهترین امتیاز']
  ];
  return `<div class="flex flex-col gap-1">
    ${options.map(([val,label]) => `
      <label class="flex items-center gap-3 rounded-xl px-3 py-3 text-sm hover:bg-surface-muted">
        <input class="sort-radio" type="radio" name="sort-mobile" value="${val}" onchange="setSort('${val}')" ${filterState.sort===val?'checked':''} />
        ${label}
      </label>`).join('')}
  </div>`;
}

function openSheet(type){
  if(currentSheet === type){ closeSheet(); return; }
  currentSheet = type;
  document.getElementById('sheet-title').textContent = sheetTitles[type];
  const body = document.getElementById('sheet-body');
  const footer = document.getElementById('sheet-footer');
  if(type === 'filters'){
    body.innerHTML = `<div id="sheet-filters-body">${filtersHTML('mobile')}</div>`;
    // دکمه‌های اعمال/حذف فیلتر یک فوتر ثابت و همیشه‌دیده هستن (نه بخشی از محتوای اسکرول‌شونده)
    // تا هیچ‌وقت، حتی وقتی محتوا کوتاهه، بیرون از دید نباشن
    footer.innerHTML = `
      <button onclick="clearFilters('mobile')" class="flex-1 rounded-xl border border-line py-2.5 text-xs font-semibold hover:border-danger hover:text-danger">حذف فیلترها</button>
      <button onclick="applyFiltersFromSheet()" class="flex-1 rounded-xl bg-emerald py-2.5 text-xs font-semibold text-white hover:bg-emerald-deep">اعمال فیلترها</button>
    `;
    footer.classList.remove('hidden');
    footer.classList.add('flex');
  } else {
    body.innerHTML = sortSheetHTML();
    footer.classList.add('hidden');
    footer.classList.remove('flex');
    footer.innerHTML = '';
  }
  document.getElementById('sheet-overlay').classList.remove('hidden');
  const panel = document.getElementById('sheet-panel');
  panel.classList.remove('hidden');
  panel.classList.add('flex');
  requestAnimationFrame(() => panel.classList.remove('translate-y-full'));
}

function closeSheet(){
  currentSheet = null;
  const panel = document.getElementById('sheet-panel');
  panel.classList.add('translate-y-full');
  document.getElementById('sheet-overlay').classList.add('hidden');
  setTimeout(() => { panel.classList.add('hidden'); panel.classList.remove('flex'); }, 300);
}

/* ================= INIT ================= */
document.getElementById('sort-select').addEventListener('change', (e) => setSort(e.target.value));
ProductCard.bind(document.getElementById('product-grid'));

async function init(){
  await loadCategoriesAndBrands();

  // اگه از صفحه اصلی روی یه دسته‌بندی کلیک شده (shop.html?category=fashion)، همون دسته تیک بخوره
  const params = new URLSearchParams(window.location.search);
  const categorySlug = params.get('category');
  if(categorySlug){
    const match = CATEGORIES.find(c => c.slug === categorySlug);
    if(match) filterState.categoryIds = [match.id];
  }

  // اگه از جستجوی هدر با اینتر اومده (shop.html?search=...)
  const searchTerm = params.get('search');
  if(searchTerm) filterState.search = searchTerm;

  renderFilters();
  resetAndRender();
  ProductCard.resolvePendingWishlist();
}

init();
</script>

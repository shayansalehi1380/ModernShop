<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>آتلیه | نتیجه سفارش</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  :root{
    --background:#F6F5F0; --foreground:#14171C; --surface:#FFFFFF; --surface-muted:#EFEEE7;
    --line:#E1DED3; --muted:#6B7280; --emerald:#1F6F5C; --emerald-deep:#123B31;
    --emerald-soft:#E4EFEB; --gold:#B8903E; --gold-soft:#F3E9D3; --danger:#B4432F; --media:#16181C;
  }
  body{font-family:'Vazirmatn',Tahoma,sans-serif;color:var(--foreground);transition:.3s;background:radial-gradient(1300px 700px at 12% -10%, color-mix(in srgb, var(--gold) 5%, transparent), transparent 60%),radial-gradient(1300px 700px at 100% 100%, color-mix(in srgb, var(--emerald) 5%, transparent), transparent 60%),var(--background);background-repeat:no-repeat;}
  .ticker{font-family:'JetBrains Mono',monospace;direction:ltr;unicode-bidi:isolate;letter-spacing:-.02em}
  .bg-surface{background:var(--surface)} .bg-surface-muted{background:var(--surface-muted)}
  .bg-bg{background:var(--background)} .border-line{border-color:var(--line)}
  .text-muted{color:var(--muted)} .text-emerald{color:var(--emerald)} .bg-emerald{background:var(--emerald)}
  .bg-emerald-deep{background:var(--emerald-deep)} .text-emerald-deep{color:var(--emerald-deep)} .bg-emerald-soft{background:var(--emerald-soft)}
  .text-gold{color:var(--gold)} .bg-gold-soft{background:var(--gold-soft)}
  .text-danger{color:var(--danger)} .bg-danger{background:var(--danger)} .bg-danger\/10{background:color-mix(in srgb, var(--danger) 10%, transparent)}
  .bg-media{background:var(--media)}
  .border-emerald{border-color:var(--emerald)}
  .border-danger{border-color:var(--danger)}
  .hover\:bg-surface-muted:hover{background:var(--surface-muted)}
  .hover\:border-emerald:hover{border-color:var(--emerald)}
  .hover\:text-emerald:hover{color:var(--emerald)}
  .bg-emerald-hover:hover{background:#195d4d}
  .bg-danger-hover:hover{background:#933524}
  .skeleton{background:linear-gradient(90deg, var(--surface-muted) 25%, var(--line) 37%, var(--surface-muted) 63%);background-size:400% 100%;animation:skeleton-loading 1.4s ease infinite}
  @keyframes skeleton-loading{0%{background-position:100% 50%}100%{background-position:0 50%}}
  @keyframes pop-in{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  .pop-in{animation:pop-in .35s cubic-bezier(.2,.9,.3,1.2)}
</style>
</head>
<body class="bg-bg">

<div id="toast-root" class="pointer-events-none fixed inset-x-0 top-4 z-[200] flex flex-col items-center gap-2 px-4"></div>

<div id="header-placeholder"></div>

<div class="mx-auto max-w-2xl px-4 py-10 sm:px-6 lg:px-8">

  <!-- loading -->
  <div id="loading-state" class="flex flex-col items-center gap-6">
    <div class="skeleton h-20 w-20 rounded-full"></div>
    <div class="skeleton h-6 w-52 rounded-lg"></div>
    <div class="skeleton h-64 w-full rounded-3xl"></div>
  </div>

  <!-- سفارش پیدا نشد / خطا -->
  <div id="notfound-state" class="hidden flex-col items-center gap-4 rounded-3xl border border-line bg-surface p-10 text-center">
    <span class="flex h-16 w-16 items-center justify-center rounded-full bg-surface-muted text-muted">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    </span>
    <h1 class="text-lg font-extrabold">سفارشی یافت نشد</h1>
    <p class="text-sm text-muted">لینکی که از آن وارد شده‌اید معتبر نیست یا این سفارش متعلق به شما نیست.</p>
    <a href="account.html?tab=orders" class="mt-2 rounded-2xl bg-emerald bg-emerald-hover px-6 py-3 text-sm font-bold text-white transition-colors duration-200">
      مشاهده سفارش‌های من
    </a>
  </div>

  <!-- نتیجه سفارش -->
  <div id="result-content" class="hidden flex-col items-center gap-6">

    <!-- آیکن وضعیت -->
    <div id="status-icon-wrap" class="pop-in flex h-20 w-20 items-center justify-center rounded-full"></div>

    <div class="text-center">
      <h1 id="status-title" class="text-xl font-extrabold sm:text-2xl"></h1>
      <p id="status-desc" class="mt-2 text-sm text-muted"></p>
    </div>

    <!-- کارت جزئیات سفارش -->
    <div class="w-full rounded-3xl border border-line bg-surface p-6">
      <div class="flex items-center justify-between border-b border-line pb-4">
        <div>
          <p class="text-xs text-muted">شماره سفارش</p>
          <p id="order-number" class="ticker mt-1 text-base font-extrabold"></p>
        </div>
        <div class="text-left">
          <p class="text-xs text-muted">تاریخ ثبت</p>
          <p id="order-date" class="ticker mt-1 text-sm font-semibold"></p>
        </div>
      </div>

      <div id="order-items" class="mt-4 flex flex-col gap-3 border-b border-line pb-4"></div>

      <div class="mt-4 space-y-2.5 text-sm">
        <div class="flex items-center justify-between">
          <span class="text-muted">جمع کالاها</span>
          <span class="ticker font-semibold" id="sum-subtotal">۰</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-muted">هزینه ارسال</span>
          <span class="ticker font-semibold" id="sum-shipping">۰</span>
        </div>
        <div class="flex items-center justify-between" id="sum-discount-row" style="display:none">
          <span class="text-muted">تخفیف</span>
          <span class="ticker font-semibold text-danger" id="sum-discount">۰</span>
        </div>
      </div>

      <div class="mt-4 flex items-baseline justify-between border-t border-line pt-4">
        <span class="text-sm font-bold">مبلغ نهایی</span>
        <span class="ticker text-xl font-extrabold text-emerald" id="sum-total">۰</span>
      </div>
      <p class="mt-0.5 text-left text-[11px] text-muted">تومان</p>
    </div>

    <!-- دکمه‌های اقدام -->
    <div class="flex w-full flex-col gap-3">
      <button id="retry-payment-btn" class="hidden w-full items-center justify-center gap-2 rounded-2xl bg-danger bg-danger-hover py-3.5 text-sm font-bold text-white transition-colors duration-200">
        تلاش مجدد پرداخت
      </button>
      <button id="goto-orders-btn" class="flex w-full items-center justify-center rounded-2xl bg-emerald bg-emerald-hover py-3.5 text-sm font-bold text-white transition-colors duration-200">
        مشاهده سفارش‌های من
      </button>
      <a href="shop.html" class="flex w-full items-center justify-center rounded-2xl border border-line py-3.5 text-sm font-semibold text-foreground hover:border-emerald hover:text-emerald">
        ادامه خرید
      </a>
    </div>

    <p id="redirect-note" class="text-center text-xs text-muted"></p>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="mobile-nav-placeholder"></div>

<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/search.js"></script>
<script src="js/mobile-nav.js"></script>
<script>
function showToast(kind, message){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  const styles = kind === 'success' ? 'border-emerald bg-emerald-soft text-emerald-deep' : 'border-danger bg-danger/10 text-danger';
  el.className = `pointer-events-auto flex items-center gap-2 rounded-full border px-4 py-2.5 text-sm font-medium shadow-lg backdrop-blur-md opacity-0 -translate-y-3 transition-all duration-300 ${styles}`;
  el.innerHTML = (kind === 'success'
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.1V12a10 10 0 1 1-5.9-9.1"/><path d="m9 11 3 3L22 4"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>')
    + `<span>${message}</span>`;
  root.appendChild(el);
  requestAnimationFrame(() => el.classList.remove('opacity-0', '-translate-y-3'));
  setTimeout(() => { el.classList.add('opacity-0', '-translate-y-3'); setTimeout(() => el.remove(), 300); }, 3000);
}

function toFaDigits(str){
  const faDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
  return String(str || '').replace(/[0-9]/g, d => faDigits[d]);
}

/* ---------- گیت لاگین: مشاهده نتیجه سفارش نیاز به ورود داره ---------- */
if(!isLoggedIn()){
  window.location.href = 'auth.html?redirect=' + encodeURIComponent('order-complete.html' + window.location.search);
}

const ORDER_STATUS = { PENDING_PAYMENT: 0, PROCESSING: 1, SHIPPED: 2, DELIVERED: 3, CANCELLED: 4, FAILED: 5 };
const REDIRECT_SECONDS = 8;
let countdownInterval = null;

const params = new URLSearchParams(window.location.search);
const orderNumber = params.get('orderNumber');

function goToOrders(){
  window.location.href = 'account.html?tab=orders';
}

function cancelAutoRedirect(){
  if(countdownInterval){
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
  const note = document.getElementById('redirect-note');
  if(note) note.textContent = '';
}

function startAutoRedirect(){
  let remaining = REDIRECT_SECONDS;
  const note = document.getElementById('redirect-note');
  const tick = () => {
    note.textContent = `انتقال به سفارش‌های شما تا ${toFaDigits(remaining)} ثانیه دیگر...`;
    if(remaining <= 0){
      clearInterval(countdownInterval);
      goToOrders();
      return;
    }
    remaining--;
  };
  tick();
  countdownInterval = setInterval(tick, 1000);
}

function renderItems(items){
  document.getElementById('order-items').innerHTML = items.map(item => `
    <div class="flex items-center gap-3">
      <div class="relative h-12 w-12 shrink-0 overflow-hidden rounded-lg bg-media">
        <img src="${item.imageUrl}" class="h-full w-full object-cover" />
        <span class="ticker absolute -top-1.5 -right-1.5 flex h-4 w-4 items-center justify-center rounded-full bg-emerald text-[9px] font-bold text-white">${item.quantity}</span>
      </div>
      <span class="flex-1 truncate text-xs">${item.productName}</span>
      <span class="ticker shrink-0 text-xs font-semibold">${formatPrice(item.totalPrice)}</span>
    </div>
  `).join('');
}

function renderOrder(order){
  document.getElementById('order-number').textContent = order.orderNumber;
  document.getElementById('order-date').textContent = toFaDigits(new Date(order.createdAt).toLocaleDateString('fa-IR'));

  renderItems(order.items);

  document.getElementById('sum-subtotal').textContent = formatPrice(order.subTotal);
  document.getElementById('sum-shipping').textContent = order.shippingCost === 0 ? 'رایگان' : formatPrice(order.shippingCost);
  document.getElementById('sum-total').textContent = formatPrice(order.totalAmount);

  if(order.discountAmount > 0){
    document.getElementById('sum-discount-row').style.display = 'flex';
    document.getElementById('sum-discount').textContent = '- ' + formatPrice(order.discountAmount);
  }

  const iconWrap = document.getElementById('status-icon-wrap');
  const title = document.getElementById('status-title');
  const desc = document.getElementById('status-desc');
  const retryBtn = document.getElementById('retry-payment-btn');

  const isFailed = order.status === ORDER_STATUS.FAILED;

  if(isFailed){
    iconWrap.classList.add('bg-danger/10', 'text-danger');
    iconWrap.innerHTML = '<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>';
    title.textContent = 'پرداخت ناموفق بود';
    desc.textContent = 'متأسفانه پرداخت شما تکمیل نشد یا توسط شما لغو شد. می‌توانید دوباره تلاش کنید یا این سفارش را از حساب کاربری خود پیگیری کنید.';
    retryBtn.classList.remove('hidden');
    retryBtn.classList.add('flex');
  } else {
    iconWrap.classList.add('bg-emerald-soft', 'text-emerald');
    iconWrap.innerHTML = '<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.1V12a10 10 0 1 1-5.9-9.1"/><path d="m9 11 3 3L22 4"/></svg>';
    if(order.paymentMethod === 0){
      title.textContent = 'پرداخت با موفقیت انجام شد';
      desc.textContent = 'از خرید شما متشکریم. سفارشتان ثبت شد و به‌زودی برای ارسال آماده می‌شود.';
    } else {
      title.textContent = 'سفارش شما با موفقیت ثبت شد';
      desc.textContent = 'از خرید شما متشکریم. مبلغ سفارش هنگام تحویل کالا از شما دریافت می‌شود.';
    }
  }

  document.getElementById('loading-state').classList.add('hidden');
  const content = document.getElementById('result-content');
  content.classList.remove('hidden');
  content.classList.add('flex');

  startAutoRedirect();
}

document.getElementById('goto-orders-btn').addEventListener('click', () => {
  cancelAutoRedirect();
  goToOrders();
});

document.getElementById('retry-payment-btn').addEventListener('click', async () => {
  cancelAutoRedirect();
  const btn = document.getElementById('retry-payment-btn');
  if(btn.dataset.loading === '1') return;
  btn.dataset.loading = '1';
  const original = btn.textContent;
  btn.innerHTML = '<svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.2-8.5"/></svg>';

  try {
    const { paymentUrl } = await Api.retryPayment(orderNumber);
    window.location.href = paymentUrl;
  } catch(err) {
    showToast('error', err.message || 'شروع مجدد پرداخت با خطا مواجه شد');
    btn.dataset.loading = '0';
    btn.textContent = original;
  }
});

async function init(){
  if(!orderNumber){
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('notfound-state').classList.remove('hidden');
    document.getElementById('notfound-state').classList.add('flex');
    return;
  }

  try {
    const order = await Api.getOrder(orderNumber);
    renderOrder(order);
  } catch(err) {
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('notfound-state').classList.remove('hidden');
    document.getElementById('notfound-state').classList.add('flex');
  }
}

init();
</script>

</body>
</html>

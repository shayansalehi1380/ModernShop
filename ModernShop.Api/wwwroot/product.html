<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">در حال بارگذاری... | آتلیه</title>

    <!-- فونت وزیرمتن -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Vazirmatn', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        bg: 'var(--color-bg)',
                        surface: 'var(--color-surface)',
                        'surface-muted': 'var(--color-surface-muted)',
                        media: 'var(--color-media)',
                        line: 'var(--color-line)',
                        foreground: 'var(--color-foreground)',
                        muted: 'var(--color-muted)',
                        emerald: {
                            DEFAULT: 'var(--color-emerald)',
                            soft: 'var(--color-emerald-soft)',
                            deep: 'var(--color-emerald-deep)',
                        },
                        gold: {
                            DEFAULT: 'var(--color-gold)',
                            soft: 'var(--color-gold-soft)',
                        },
                        danger: 'var(--color-danger)',
                    },
                },
            },
        };
    </script>

    <style>
        :root {
            --color-bg: #f7f7f5;
            --color-surface: #ffffff;
            --color-surface-muted: #f1f1ee;
            --color-media: #ececea;
            --color-line: #e4e4e1;
            --color-foreground: #1c1c1a;
            --color-muted: #8a8a85;
            --color-emerald: #1f8a5f;
            --color-emerald-soft: #e5f4ec;
            --color-emerald-deep: #14523a;
            --color-gold: #b8903e;
            --color-gold-soft: #f7eedd;
            --color-danger: #c0392b;
        }

        html, body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            color: var(--color-foreground);
            background:
                radial-gradient(1100px 560px at 12% -8%, color-mix(in srgb, var(--color-gold) 8%, transparent), transparent 55%),
                radial-gradient(1000px 560px at 100% 6%, color-mix(in srgb, var(--color-emerald) 7%, transparent), transparent 55%),
                var(--color-bg);
            background-repeat: no-repeat;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .ticker {
            font-variant-numeric: tabular-nums;
        }

        .skeleton {
            position: relative;
            overflow: hidden;
            background-color: var(--color-surface-muted);
        }

            .skeleton::after {
                content: '';
                position: absolute;
                inset: 0;
                transform: translateX(-100%);
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
                animation: shimmer 1.5s infinite;
            }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

        .bg-emerald-hover:hover {
            background-color: var(--color-emerald-deep);
        }

        .thumb.active {
            border-color: var(--color-emerald);
        }

        .color-swatch.active {
            border-color: var(--color-emerald);
        }

        .tab-btn.active {
            color: var(--color-foreground);
            border-color: var(--color-emerald) !important;
        }

        .zoom-wrap {
            position: relative;
        }

        .zoom-img {
            transition: transform 0.4s ease;
        }

        .zoom-wrap:hover .zoom-img {
            transform: scale(1.05);
        }

        .tilt-card {
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

            .tilt-card:hover {
                box-shadow: 0 8px 24px rgba(0,0,0,0.06);
                transform: translateY(-2px);
            }

        .carousel-wrap .track.cursor-grabbing {
            cursor: grabbing;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

    <script>
        function showToast(kind, message) {
            const root = document.getElementById('toast-root');
            const el = document.createElement('div');
            const styles = kind === 'success' ? 'border-emerald bg-emerald-soft text-emerald-deep' : 'border-danger bg-danger/10 text-danger';
            el.className = `pointer-events-auto flex items-center gap-2 rounded-full border px-4 py-2.5 text-sm font-medium shadow-lg backdrop-blur-md opacity-0 -translate-y-3 transition-all duration-300 ${styles}`;
            el.innerHTML = (kind === 'success'
                ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.1V12a10 10 0 1 1-5.9-9.1"/><path d="m9 11 3 3L22 4"/></svg>'
                : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>')
                + `<span>${message}</span>`;
            root.appendChild(el);
            requestAnimationFrame(() => el.classList.remove('opacity-0', '-translate-y-3'));
            setTimeout(() => { el.classList.add('opacity-0', '-translate-y-3'); setTimeout(() => el.remove(), 300); }, 3000);
        }
        const spinnerSVG = '<svg class="animate-spin" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.2-8.5"/></svg>';

        window.addEventListener('load', () => {
            const fill = document.getElementById('loading-bar-fill');
            const bar = document.getElementById('loading-bar');
            setTimeout(() => fill.style.width = '70%', 100);
            setTimeout(() => fill.style.width = '100%', 400);
            setTimeout(() => bar.style.display = 'none', 650);
        });

        /* ---------- گرفتن slug از URL ---------- */
        const slug = new URLSearchParams(window.location.search).get('slug');
        let product = null;
        let selectedVariantId = null;
        let galleryLiked = false;

        async function loadProduct() {
            if (!slug) {
                showNotFound();
                return;
            }
            try {
                product = await Api.getProduct(slug);
                await loadCartSnapshot();
                renderProduct();
                await checkWishlistState();
                await resolvePendingGalleryWish();
                loadRelated();
            } catch (e) {
                showNotFound();
            }
        }

        // برای این‌که بعد از رفرش صفحه، اگه محصول قبلا به علاقه‌مندی‌ها اضافه شده، قلب پر نشون داده بشه
        async function checkWishlistState() {
            if (!isLoggedIn()) return;
            try {
                const items = await Api.getWishlist();
                if (items.some(w => w.productId === product.id)) {
                    galleryLiked = true;
                    document.getElementById('gallery-wish').innerHTML = '<svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor" class="text-danger"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>';
                }
            } catch (e) { /* بی‌سروصدا رد شو */ }
        }

        // بعد از برگشتن از صفحه لاگین (که به‌خاطر زدن قلب علاقه‌مندی به اونجا فرستاده شده بود)
        const PENDING_WISHLIST_KEY = 'atelier_pending_wishlist';
        async function resolvePendingGalleryWish() {
            const pendingRaw = localStorage.getItem(PENDING_WISHLIST_KEY);
            if (!pendingRaw || !isLoggedIn()) return;
            localStorage.removeItem(PENDING_WISHLIST_KEY);
            const pendingId = parseInt(pendingRaw, 10);
            if (!pendingId || pendingId !== product.id || galleryLiked) return;
            try {
                await Api.addToWishlist(pendingId);
                galleryLiked = true;
                document.getElementById('gallery-wish').innerHTML = '<svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor" class="text-danger"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>';
                showToast('success', 'به علاقه‌مندی‌ها اضافه شد');
            } catch (e) { /* بی‌سروصدا رد شو */ }
        }

        function showNotFound() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('not-found-state').classList.remove('hidden');
        }

        function renderProduct() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('product-content').classList.remove('hidden');
            document.getElementById('related-section').classList.remove('hidden');
            document.getElementById('mobile-cart-bar').classList.remove('hidden');
            document.getElementById('mobile-cart-bar').classList.add('flex');

            document.getElementById('page-title').textContent = `${product.name} | آتلیه`;
            document.getElementById('breadcrumb-category').textContent = product.categoryName;
            document.getElementById('breadcrumb-title').textContent = product.name;
            document.getElementById('info-category').textContent = product.categoryName;
            document.getElementById('product-name').textContent = product.name;
            document.getElementById('avg-rating').textContent = product.averageRating.toFixed(1);
            document.getElementById('review-count').textContent = product.reviewCount;
            document.getElementById('tab-review-count').textContent = product.reviewCount;
            document.getElementById('sku-display').textContent = product.sku ? `کد کالا: ${product.sku}` : '';

            // گالری - تصویر شاخص همیشه پیش‌فرضه؛ فلش‌های راست/چپ بین تصاویر جابه‌جا می‌کنن
            const images = product.images.length ? product.images : [{ imageUrl: '', isMain: true }];
            const mainImg = images.find(i => i.isMain) || images[0];
            galleryImages = images;
            galleryIndex = Math.max(0, images.indexOf(mainImg));
            document.getElementById('main-image').src = mainImg.imageUrl;
            document.getElementById('thumb-row').innerHTML = images.map((img, i) => `
            <button onclick="setMainImage(this, '${img.imageUrl}')" class="thumb ${img.imageUrl === mainImg.imageUrl ? 'active' : ''} h-20 w-20 shrink-0 overflow-hidden rounded-2xl border-2 border-line">
              <img src="${img.imageUrl}" class="h-full w-full object-cover" />
            </button>
          `).join('');
            updateGalleryArrows();

            // قیمت پایه (بدون احتساب اختلاف قیمت تنوع - اون تو updatePriceDisplay اعمال می‌شه)
            if (product.discountPrice) {
                const pct = Math.round((1 - product.discountPrice / product.price) * 100);
                document.getElementById('old-price').classList.remove('hidden');
                const pctEl = document.getElementById('discount-pct');
                pctEl.textContent = `${pct}٪ تخفیف`;
                pctEl.classList.remove('hidden');
                const badge = document.getElementById('discount-badge');
                badge.textContent = `${pct}٪ تخفیف`;
                badge.classList.remove('hidden');
            }

            // رنگ/سایز، قیمت نهایی، موجودی و ناحیه‌ی افزودن به سبد - همه بر اساس تنوع انتخاب‌شده
            initVariants();

            // توضیحات
            document.getElementById('tab-desc').innerHTML = product.description
                ? product.description
                : `<p class="text-muted">توضیحاتی برای این محصول ثبت نشده است.</p>`;

            // مشخصات فنی
            const specsWrap = document.getElementById('tab-specs');
            if (product.specifications && product.specifications.length) {
                specsWrap.innerHTML = `
              <div class="grid grid-cols-2 divide-x divide-line divide-x-reverse border-b border-line bg-surface-muted text-sm">
                <div class="px-4 py-3 font-semibold">مشخصه</div><div class="px-4 py-3 font-semibold">مقدار</div>
              </div>
              ${product.specifications.map((s, i) => `
                <div class="grid grid-cols-2 divide-x divide-line divide-x-reverse ${i < product.specifications.length - 1 ? 'border-b border-line' : ''} text-sm">
                  <div class="px-4 py-3 text-muted">${s.key}</div><div class="px-4 py-3">${s.value}</div>
                </div>
              `).join('')}
            `;
            } else {
                specsWrap.innerHTML = `<p class="p-4 text-sm text-muted">مشخصات فنی ثبت نشده است.</p>`;
            }

            // نظرات
            const reviewsWrap = document.getElementById('tab-reviews');
            if (product.reviews && product.reviews.length) {
                reviewsWrap.innerHTML = `
              <div class="mb-6 flex items-center gap-4 rounded-2xl bg-surface-muted p-5">
                <div class="text-center">
                  <div class="ticker text-3xl font-extrabold">${product.averageRating.toFixed(1)}</div>
                </div>
                <div class="text-xs text-muted">بر اساس ${product.reviewCount} نظر خریداران</div>
              </div>
              <div class="space-y-5">
                ${product.reviews.map((r, i) => `
                  <div class="${i < product.reviews.length - 1 ? 'border-b border-line' : ''} pb-5">
                    <div class="flex items-center justify-between">
                      <span class="text-sm font-semibold">${r.userFullName}</span>
                      <span class="text-[11px] text-muted">${new Date(r.createdAt).toLocaleDateString('fa-IR')}</span>
                    </div>
                    <div class="mt-1 flex gap-0.5">${starsHtml(r.rating)}</div>
                    <p class="mt-2 text-sm leading-7 text-foreground/80">${r.comment || ''}</p>
                    ${r.adminReply ? `
                    <div class="mt-3 rounded-xl border-r-4 border-emerald bg-surface-muted p-3">
                      <div class="mb-1 text-xs font-bold text-emerald">پاسخ فروشگاه</div>
                      <p class="text-xs leading-6 text-foreground/80">${r.adminReply}</p>
                    </div>` : ''}
                  </div>
                `).join('')}
              </div>
            `;
            } else {
                reviewsWrap.innerHTML = `<p class="text-sm text-muted">هنوز نظری برای این محصول ثبت نشده است.</p>`;
            }

            updateCartBadge();
        }

        function starsHtml(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += i <= rating
                    ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" class="text-gold"><path d="m12 2 3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1Z"/></svg>'
                    : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gold"><path d="m12 2 3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1Z"/></svg>';
            }
            return html;
        }

        function colorToHex(name) {
            const map = { 'مشکی': '#1c1c1c', 'سفید': '#f4f3ee', 'طلایی': '#b8903e', 'قرمز': '#b4432f', 'آبی': '#1f4b6f', 'سبز': '#1f6f5c' };
            return map[name] || '#9ca3af';
        }

        /* ---------- گالری ---------- */
        let galleryImages = [];
        let galleryIndex = 0;

        function setMainImage(btn, url) {
            document.getElementById('main-image').src = url;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            const idx = galleryImages.findIndex(img => img.imageUrl === url);
            if (idx !== -1) galleryIndex = idx;
        }

        function galleryStep(dir) {
            if (galleryImages.length < 2) return;
            galleryIndex = (galleryIndex + dir + galleryImages.length) % galleryImages.length;
            document.getElementById('main-image').src = galleryImages[galleryIndex].imageUrl;
            document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === galleryIndex));
        }

        function updateGalleryArrows() {
            const show = galleryImages.length > 1;
            ['gallery-next', 'gallery-prev'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', !show);
                document.getElementById(id).classList.toggle('flex', show);
            });
        }

        async function toggleGalleryWish() {
            if (!isLoggedIn()) {
                // بعد از لاگین باید بلافاصله همین محصول به علاقه‌مندی‌ها اضافه بشه
                localStorage.setItem(PENDING_WISHLIST_KEY, String(product.id));
                window.location.href = 'auth.html?redirect=' + encodeURIComponent(`product.html?slug=${slug}`);
                return;
            }
            const btn = document.getElementById('gallery-wish');
            btn.innerHTML = spinnerSVG;
            try {
                if (galleryLiked) {
                    await Api.removeFromWishlist(product.id);
                    galleryLiked = false;
                    btn.innerHTML = '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>';
                    showToast('success', 'از علاقه‌مندی‌ها حذف شد');
                } else {
                    await Api.addToWishlist(product.id);
                    galleryLiked = true;
                    btn.innerHTML = '<svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor" class="text-danger"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>';
                    showToast('success', 'به علاقه‌مندی‌ها اضافه شد');
                }
            } catch (err) {
                showToast('error', err.message);
            }
        }

        /* ---------- رنگ/سایز ----------
           هر تنوع { id, color, size, stockQuantity, priceAdjustment } هست؛ اول بر اساس رنگ گروه‌بندی
           می‌شیم، بعد سایزهای همون رنگ رو زیرش نشون می‌دیم. انتخاب نهایی همیشه یک variantId مشخص می‌شه
           که قیمت نهایی، موجودی و ناحیه‌ی افزودن به سبد بر اساس همون به‌روز می‌شه. */
        let variantsByColor = {};

        function initVariants() {
            if (!product.variants || !product.variants.length) {
                document.getElementById('variant-block').classList.add('hidden');
                document.getElementById('size-block').classList.add('hidden');
                selectedVariantId = null;
                onVariantSelected();
                return;
            }

            document.getElementById('variant-block').classList.remove('hidden');
            variantsByColor = {};
            product.variants.forEach(v => {
                const key = v.color || '—';
                (variantsByColor[key] = variantsByColor[key] || []).push(v);
            });

            const colors = Object.keys(variantsByColor);
            document.getElementById('color-swatches').innerHTML = colors.map((c, i) => `
              <button onclick="selectColor('${c.replace(/'/g, "\\'")}', this)" class="color-swatch ${i === 0 ? 'active' : ''} h-9 w-9 rounded-full border-2 ${i === 0 ? '' : 'border-transparent'} p-0.5" aria-label="${c}">
                <span class="block h-full w-full rounded-full border border-line" style="background:${colorToHex(c)}"></span>
              </button>
            `).join('');

            selectColor(colors[0], document.querySelector('#color-swatches .color-swatch'));
        }

        function selectColor(color, btn) {
            document.getElementById('color-label').textContent = color;
            document.querySelectorAll('#color-swatches .color-swatch').forEach(s => { s.classList.remove('active'); s.classList.add('border-transparent'); });
            if (btn) { btn.classList.add('active'); btn.classList.remove('border-transparent'); }

            const sizes = variantsByColor[color].filter(v => v.size && v.size !== '-');
            if (sizes.length) {
                document.getElementById('size-block').classList.remove('hidden');
                document.getElementById('size-swatches').innerHTML = sizes.map((v, i) => `
                  <button onclick="selectSize(${v.id}, '${(v.size || '').replace(/'/g, "\\'")}', this)" class="size-swatch ${i === 0 ? 'active border-emerald text-emerald' : 'border-line'} rounded-xl border-2 px-3.5 py-1.5 text-xs font-semibold">${v.size}</button>
                `).join('');
                selectSize(sizes[0].id, sizes[0].size, document.querySelector('#size-swatches .size-swatch'));
            } else {
                document.getElementById('size-block').classList.add('hidden');
                document.getElementById('size-label').textContent = '';
                selectedVariantId = variantsByColor[color][0].id;
                onVariantSelected();
            }
        }

        function selectSize(variantId, sizeName, btn) {
            selectedVariantId = variantId;
            document.getElementById('size-label').textContent = sizeName;
            document.querySelectorAll('#size-swatches .size-swatch').forEach(s => { s.classList.remove('active', 'border-emerald', 'text-emerald'); s.classList.add('border-line'); });
            if (btn) { btn.classList.add('active', 'border-emerald', 'text-emerald'); btn.classList.remove('border-line'); }
            onVariantSelected();
        }

        function currentVariant() {
            if (!product.variants || !product.variants.length) return null;
            return product.variants.find(v => v.id === selectedVariantId) || null;
        }

        function currentStock() {
            const v = currentVariant();
            return v ? v.stockQuantity : product.stockQuantity;
        }

        function onVariantSelected() {
            updatePriceDisplay();
            updateStockDisplay();
            refreshPdpCartArea();
        }

        /* ---------- قیمت (بر اساس تنوع انتخاب‌شده) ---------- */
        function updatePriceDisplay() {
            const v = currentVariant();
            const adj = v ? (v.priceAdjustment || 0) : 0;
            const mainPrice = (product.discountPrice ?? product.price) + adj;
            document.getElementById('main-price').textContent = formatPrice(mainPrice);
            document.getElementById('mobile-price').textContent = formatPrice(mainPrice);
            if (product.discountPrice) {
                document.getElementById('old-price').textContent = formatPrice(product.price + adj);
            }
        }

        /* ---------- موجودی (بر اساس تنوع انتخاب‌شده) ---------- */
        function updateStockDisplay() {
            const stockEl = document.getElementById('stock-status');
            if (currentStock() > 0) {
                stockEl.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-emerald"><path d="M12 2 4 5v6c0 5 3.4 8.9 8 11 4.6-2.1 8-6 8-11V5Z"/><path d="m9 12 2 2 4-4"/></svg><span class="text-emerald">موجود در انبار — ارسال ۲۴ ساعته</span>`;
            } else {
                stockEl.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-danger"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg><span class="text-danger">ناموجود</span>`;
            }
        }

        /* ---------- افزودن به سبد / استپر تعداد ----------
           دقیقاً همون رفتار کارت محصول تو بقیه‌ی سایت (index/shop/محصولات مرتبط): کلیک اول یه بار
           «افزودن به سبد» رو صدا می‌زنه، بعدش دکمه به یه استپر +/- تبدیل می‌شه که با تعداد واقعی سبد
           هماهنگه و بعد از رفرش کامل صفحه هم درست می‌مونه. چون محصول متغیره، سبد رو بر اساس
           (شناسه محصول + شناسه تنوع انتخاب‌شده) پیدا می‌کنیم، نه فقط شناسه محصول. */
        let cartSnapshot = null;

        async function loadCartSnapshot() {
            try { cartSnapshot = await Api.getCart(); } catch (e) { cartSnapshot = null; }
        }

        function findCartItemForSelection() {
            if (!cartSnapshot) return null;
            return cartSnapshot.items.find(i => i.productId === product.id && (i.productVariantId || null) === (selectedVariantId || null)) || null;
        }

        function pdpCartAreaHTML(qty, inStock) {
            if (!inStock) {
                return `<button disabled class="flex w-full items-center justify-center gap-2 rounded-2xl border border-line py-3 text-sm font-bold opacity-40">ناموجود</button>`;
            }
            if (qty > 0) {
                return `<div class="flex items-center justify-between rounded-2xl border border-emerald bg-emerald-soft px-3 py-2">
                  <button type="button" onclick="pdpChangeQty(-1)" class="flex h-9 w-9 items-center justify-center rounded-xl bg-white text-emerald text-lg font-bold leading-none" aria-label="کم کردن">−</button>
                  <span class="ticker text-base font-bold text-emerald-deep">${qty}</span>
                  <button type="button" onclick="pdpChangeQty(1)" class="flex h-9 w-9 items-center justify-center rounded-xl bg-white text-emerald text-lg font-bold leading-none" aria-label="زیاد کردن">+</button>
                </div>`;
            }
            return `<button type="button" onclick="pdpAddToCart()" class="flex w-full items-center justify-center gap-2 rounded-2xl bg-emerald bg-emerald-hover py-3 text-sm font-bold text-white transition-colors duration-200">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
              افزودن به سبد خرید
            </button>`;
        }

        function refreshPdpCartArea() {
            const item = findCartItemForSelection();
            const qty = item ? item.quantity : 0;
            const html = pdpCartAreaHTML(qty, currentStock() > 0);
            document.getElementById('pdp-cart-area').innerHTML = html;
            document.getElementById('mobile-cart-area').innerHTML = html;
        }

        async function pdpAddToCart() {
            try {
                cartSnapshot = await Api.addToCart(product.id, 1, selectedVariantId);
                refreshPdpCartArea();
                updateCartBadge();
                showToast('success', 'به سبد خرید اضافه شد');
            } catch (e) {
                showToast('error', e.message || 'خطا در افزودن به سبد خرید');
            }
        }

        async function pdpChangeQty(delta) {
            const item = findCartItemForSelection();
            if (!item) return;
            const newQty = item.quantity + delta;
            try {
                cartSnapshot = newQty <= 0 ? await Api.removeCartItem(item.id) : await Api.updateCartItem(item.id, newQty);
                refreshPdpCartArea();
                updateCartBadge();
            } catch (e) {
                showToast('error', e.message || 'خطا در بروزرسانی سبد خرید');
            }
        }

        /* ---------- تب‌ها ---------- */
        function switchTab(id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('hidden', p.id !== `tab-${id}`));
        }

        /* ---------- محصولات مرتبط ---------- */
        /* کارت محصولات مرتبط از کامپوننت مشترک js/product-card.js میاد (ProductCard.render/bind) */

        async function loadRelated() {
            try {
                await ProductCard.loadState();
                const result = await Api.getProducts('?sortBy=rating&pageSize=12');
                const related = result.items.filter(p => p.id !== product.id).slice(0, 8);
                buildRelatedCarousel(related);
            } catch (e) {
                buildRelatedCarousel([]);
            }
        }

        function buildRelatedCarousel(items) {
            const wrap = document.getElementById('carousel-related');
            if (!items || items.length === 0) {
                wrap.innerHTML = `<p class="py-6 text-center text-sm text-muted">محصول مشابهی یافت نشد</p>`;
                return;
            }
            wrap.innerHTML = `
            <div class="fade-right pointer-events-none absolute inset-y-0 right-0 z-10 w-10 bg-gradient-to-l from-bg to-transparent transition-opacity duration-300 sm:w-16 opacity-0"></div>
            <div class="fade-left pointer-events-none absolute inset-y-0 left-0 z-10 w-10 bg-gradient-to-r from-bg to-transparent transition-opacity duration-300 sm:w-16 opacity-0"></div>
            <button class="arrow-next absolute left-1 top-1/2 z-20 hidden h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full border border-line bg-surface text-foreground shadow-md transition hover:border-emerald hover:text-emerald active:scale-95" aria-label="کارت بعدی">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button class="arrow-prev absolute right-1 top-1/2 z-20 hidden h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full border border-line bg-surface text-foreground shadow-md transition hover:border-emerald hover:text-emerald active:scale-95" aria-label="کارت قبلی">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg>
            </button>
            <div class="track flex cursor-grab gap-4 overflow-x-auto pb-2 select-none no-scrollbar"></div>
          `;
            const track = wrap.querySelector('.track');
            track.innerHTML = items.map(p => `<div class="w-[220px] shrink-0 sm:w-[240px]">${ProductCard.render(p)}</div>`).join('');
            ProductCard.bind(track);

            const fadeRight = wrap.querySelector('.fade-right');
            const fadeLeft = wrap.querySelector('.fade-left');
            const arrowNext = wrap.querySelector('.arrow-next');
            const arrowPrev = wrap.querySelector('.arrow-prev');
            function scrollBy(dir) { track.scrollBy({ left: track.clientWidth * 0.7 * dir, behavior: 'smooth' }); }
            arrowNext.addEventListener('click', () => scrollBy(-1));
            arrowPrev.addEventListener('click', () => scrollBy(1));
            function updateEdges() {
                const scrolled = Math.abs(track.scrollLeft);
                const max = track.scrollWidth - track.clientWidth;
                const atStart = scrolled <= 4;
                const atEnd = max <= 4 || scrolled >= max - 4;
                fadeRight.style.opacity = atStart ? '0' : '1';
                fadeLeft.style.opacity = atEnd ? '0' : '1';
                arrowNext.style.display = atEnd ? 'none' : 'flex';
                arrowPrev.style.display = atStart ? 'none' : 'flex';
            }
            track.addEventListener('scroll', updateEdges, { passive: true });
            window.addEventListener('resize', updateEdges);
            updateEdges();
            let dragActive = false, lastX = 0, moved = false;
            track.addEventListener('mousedown', (e) => { dragActive = true; lastX = e.pageX; moved = false; track.classList.add('cursor-grabbing'); });
            track.addEventListener('mousemove', (e) => {
                if (!dragActive) return;
                const dx = e.pageX - lastX;
                if (Math.abs(dx) > 2) moved = true;
                track.scrollBy({ left: -dx });
                lastX = e.pageX;
            });
            function endDrag() { dragActive = false; track.classList.remove('cursor-grabbing'); }
            track.addEventListener('mouseup', endDrag);
            track.addEventListener('mouseleave', endDrag);
            track.addEventListener('click', (e) => { if (moved) { e.preventDefault(); e.stopPropagation(); moved = false; } }, true);
        }

        /* ---------- شروع ---------- */
        updateAuthUI();
        updateCartBadge();
        loadProduct();
    </script>

</body>
</html>
